<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Choice Tutor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            background: #f8f9fa;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            text-align: center;
            color: white;
            margin: 0;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .upload-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 8px;
        }

        .upload-title {
            font-size: 1.3em;
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }

        .upload-subtitle {
            margin-top: 0;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }
        
        .file-input {
            margin: 10px 0;
            padding: 8px;
        }

        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center; /* Centered for single card */
        }

        .option-card {
            flex: 0 1 400px; /* Fixed width for the single card */
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 15px 20px;
            background: #fafafa;
            text-align: left;
        }

        .option-card h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.05em;
            color: #333;
        }

        .option-card p {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 0.95em;
            color: #555;
        }

        .bank-select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .info-btn {
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 18px;
            line-height: 32px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            padding: 0;
            font-weight: bold;
        }

        #templateInstructions {
            text-align: left;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            background: #e9ecef;
            line-height: 1.5;
            font-size: 0.9em;
        }

        .btn-template-download {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            display: inline-block;
            transition: background 0.3s;
        }
        
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #3498db;
            color: white;
        }
        
        .question-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #666;
        }
        
        .question-container {
            min-height: 400px;
        }
        
        .question-stem {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid transparent;
        }
        
        .show-choices-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        
        .show-choices-btn.hidden {
            display: none;
        }
        
        .choices-container {
            display: none;
            margin-top: 20px;
        }
        
        .choice {
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .choice-content {
            flex: 1;
        }
        
        .choice:hover {
            border-color: #3498db;
            background: #f8f9fa;
        }
        
        .choice.eliminated {
            text-decoration: line-through;
            opacity: 0.5;
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        .choice.selected {
            font-weight: bold;
            background: #d1ecf1;
            border-color: #3498db;
        }
        
        .choice.correct-answer {
            background: #d4edda;
            border-color: #28a745;
            font-weight: bold;
        }
        
        .choice.incorrect-selected {
            background: #f8d7da;
            border-color: #dc3545;
            font-weight: bold;
        }
        
        .choice-label {
            font-weight: bold;
            display: inline-block;
            width: 20px;
        }
        
        .rationale-btn {
            background: #5a6d8c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 20px;
            line-height: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            margin-left: 10px;
        }
        
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        
        .btn {
            padding: 12px 24px;
            margin: 0 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results-info {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #e8f5e8;
            border-radius: 6px;
            color: #155724;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        .hidden {
            display: none;
        }

        #rationaleModal, #embedModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        #rationaleModalContent, #modalContent {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90vw;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        #closeRationaleBtn, #closeModalBtn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
        }

        .embed-responsive {
            max-width: 100%;
            flex-grow: 1;
            overflow: hidden; 
            padding: 10px 0; 
            display: flex; 
            justify-content: center;
            align-items: center; 
        }

        .embed-icon {
            cursor: pointer;
            font-size: 20px;
            margin-left: 10px;
            color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h1>Multiple Choice Tutor</h1>
        </div>
        
        <div class="upload-section" id="uploadSection">
            <h2 class="upload-title">Get started with your quiz</h2>
            <p class="upload-subtitle">Choose the option below to load questions.</p>

            <div id="uploadError" class="error hidden"></div>

            <div class="options-grid">
                <div class="option-card">
                    <h3>3. Use a saved question bank</h3>
                    <p>Load a shared bank stored with this app.</p>
                    <select id="bankSelect" class="bank-select">
                        <option value="">Select a question bank...</option>
                        <option value="banks/Advanced Health Assessment - Review.csv">Advanced Health Assessment: Review</option>
                    </select>
                    <button class="btn btn-primary" id="loadBankBtn">Load Question Bank</button>
                </div>
            </div>

            <div style="display:none">
                <input type="file" id="csvFile">
                <button id="toggleTemplateInstructions"></button>
                <button id="downloadTemplateBtn"></button>
                <div id="templateInstructions"></div>
            </div>
        </div>
        
        <div id="quizSection" class="hidden">
            <div class="mode-selector">
                <button class="mode-btn active" id="eliminationMode">Elimination Mode</button>
                <button class="mode-btn" id="answerMode">Answer Mode</button>
            </div>
            
            <div class="question-counter" id="questionCounter"></div>
            
            <div class="question-container">
                <div class="question-stem" id="questionStem">
                    <div id="stemText"></div>
                </div>
                
                <button class="show-choices-btn" id="showChoicesBtn">Show Answer Choices</button>
                
                <div class="choices-container" id="choicesContainer">
                    <div class="choice" id="choiceA">
                        <div class="choice-content">
                            <span class="choice-label">A.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="A">?</button>
                    </div>
                    <div class="choice" id="choiceB">
                        <div class="choice-content">
                            <span class="choice-label">B.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="B">?</button>
                    </div>
                    <div class="choice" id="choiceC">
                        <div class="choice-content">
                            <span class="choice-label">C.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="C">?</button>
                    </div>
                    <div class="choice" id="choiceD">
                        <div class="choice-content">
                            <span class="choice-label">D.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="D">?</button>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="prevBtn">Previous</button>
                <button class="btn btn-secondary hidden" id="resetBtn">Reset</button>
                <button class="btn btn-success hidden" id="submitBtn">Submit Answer</button>
                <button class="btn btn-primary" id="nextBtn">Next</button>
            </div>
            
            <div class="results-info hidden" id="resultsInfo"></div>
        </div>
    </div>

    <div id="rationaleModal" class="hidden">
        <div id="rationaleModalContent">
            <button id="closeRationaleBtn">&times;</button>
            <h3 id="rationaleTitle">Rationale</h3>
            <div id="rationaleText"></div>
        </div>
    </div>

    <div id="embedModal" class="hidden">
        <div id="modalContent">
            <button id="closeModalBtn">&times;</button>
            <div id="embedTarget" class="embed-responsive"></div>
        </div>
    </div>

    <script>
        /* ORIGINAL SCRIPT - COPIED WORD FOR WORD FROM INDEX (3).HTML */
        let questions = [];
        let currentQuestionIndex = 0;
        let isEliminationMode = true;
        let userAnswers = {};
        let showingResults = false;

        const uploadSection = document.getElementById('uploadSection');
        const quizSection = document.getElementById('quizSection');
        const csvFileInput = document.getElementById('csvFile');
        const uploadError = document.getElementById('uploadError');
        const eliminationModeBtn = document.getElementById('eliminationMode');
        const answerModeBtn = document.getElementById('answerMode');
        const questionCounter = document.getElementById('questionCounter');
        const questionStem = document.getElementById('questionStem');
        const stemText = document.getElementById('stemText');
        const showChoicesBtn = document.getElementById('showChoicesBtn');
        const choicesContainer = document.getElementById('choicesContainer');
        const choices = document.querySelectorAll('.choice');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn'); 
        const submitBtn = document.getElementById('submitBtn');
        const resultsInfo = document.getElementById('resultsInfo');

        const toggleTemplateInstructionsBtn = document.getElementById('toggleTemplateInstructions');
        const templateInstructions = document.getElementById('templateInstructions');
        const downloadTemplateBtn = document.getElementById('downloadTemplateBtn');

        const bankSelect = document.getElementById('bankSelect');
        const loadBankBtn = document.getElementById('loadBankBtn');
        
        const embedModal = document.getElementById('embedModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const embedTarget = document.getElementById('embedTarget');
        
        const rationaleModal = document.getElementById('rationaleModal');
        const closeRationaleBtn = document.getElementById('closeRationaleBtn');
        const rationaleTitle = document.getElementById('rationaleTitle');
        const rationaleText = document.getElementById('rationaleText');
        const rationaleBtns = document.querySelectorAll('.rationale-btn');

        if (csvFileInput) {
            csvFileInput.addEventListener('change', handleFileUpload);
        }
        eliminationModeBtn.addEventListener('click', () => setMode(true));
        answerModeBtn.addEventListener('click', () => setMode(false));
        showChoicesBtn.addEventListener('click', expandQuestion);
        choices.forEach(choice => choice.addEventListener('click', handleChoiceClick));
        prevBtn.addEventListener('click', () => navigateQuestion(-1));
        nextBtn.addEventListener('click', () => navigateQuestion(1));
        resetBtn.addEventListener('click', resetQuestionState); 
        submitBtn.addEventListener('click', submitAnswer);
        
        closeModalBtn.addEventListener('click', hideEmbedModal);
        embedModal.addEventListener('click', handleModalOutsideClick);
        
        closeRationaleBtn.addEventListener('click', hideRationaleModal);
        rationaleModal.addEventListener('click', handleRationaleModalOutsideClick);
        rationaleBtns.forEach(btn => btn.addEventListener('click', handleRationaleClick));

        toggleTemplateInstructionsBtn.addEventListener('click', () => templateInstructions.classList.toggle('hidden'));
        downloadTemplateBtn.addEventListener('click', downloadCsvTemplate);

        if (loadBankBtn) {
            loadBankBtn.addEventListener('click', loadSelectedBank);
        }

        function downloadCsvTemplate() {
            const csvData = [
                "id", "topic", "bloom", "stem", "choice_a", "choice_b", "choice_c", "choice_d", "correct", "choice_a_rationale", "choice_b_rationale", "choice_c_rationale", "choice_d_rationale", "embed_code"
            ].join(',');
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', 'MultipleChoiceTemplate.csv');
            link.click();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            uploadError.classList.add('hidden');
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                transformHeader: header => header.toLowerCase().trim(),
                complete: function(results) {
                    if (results.errors.length > 0) {
                        showError('CSV parsing errors: ' + results.errors.map(e => e.message).join(', '));
                        return;
                    }
                    try {
                        questions = processQuestions(results.data);
                        if (questions.length === 0) {
                            showError('No valid questions found.');
                            return;
                        }
                        initializeQuiz();
                    } catch (error) {
                        showError('Error processing questions: ' + error.message);
                    }
                }
            });
        }

        function loadSelectedBank() {
            const path = bankSelect.value;
            if (!path) {
                showError('Please select a question bank to load.');
                return;
            }
            uploadError.classList.add('hidden');
            fetch(path)
                .then(response => {
                    if (!response.ok) throw new Error('Unable to load bank.');
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: header => header.toLowerCase().trim(),
                        complete: function(results) {
                            try {
                                questions = processQuestions(results.data);
                                initializeQuiz();
                            } catch (error) {
                                showError('Error processing questions: ' + error.message);
                            }
                        }
                    });
                })
                .catch(err => showError(err.message));
        }

        function processQuestions(data) {
            const requiredFields = ['id', 'stem', 'choice_a', 'choice_b', 'choice_c', 'choice_d', 'correct']; 
            const processedQuestions = [];
            for (let row of data) {
                const missingFields = requiredFields.filter(field => !row.hasOwnProperty(field) || (row[field] !== 0 && row[field] !== '0' && row[field] !== false && row[field] !== 'false' && !row[field]));
                if (missingFields.length > 0) continue;

                let correct = row.correct.toString().toUpperCase().trim();
                if (['1', '2', '3', '4'].includes(correct)) {
                    correct = ['A', 'B', 'C', 'D'][parseInt(correct) - 1];
                }
                
                if (!['A', 'B', 'C', 'D'].includes(correct)) continue;

                processedQuestions.push({
                    id: row.id ? row.id.trim() : '',
                    topic: row.topic ? row.topic.trim() : '', 
                    bloom: row.bloom ? row.bloom.trim() : '', 
                    stem: row.stem.trim(),
                    choices: {
                        A: row.choice_a.trim(),
                        B: row.choice_b.trim(),
                        C: row.choice_c.trim(),
                        D: row.choice_d.trim()
                    },
                    rationales: {
                        A: row.choice_a_rationale ? row.choice_a_rationale.trim() : 'No rationale provided.',
                        B: row.choice_b_rationale ? row.choice_b_rationale.trim() : 'No rationale provided.',
                        C: row.choice_c_rationale ? row.choice_c_rationale.trim() : 'No rationale provided.',
                        D: row.choice_d_rationale ? row.choice_d_rationale.trim() : 'No rationale provided.'
                    },
                    correct: correct,
                    embed_code: row.embed_code ? row.embed_code.trim() : '' 
                });
            }
            return processedQuestions;
        }

        function showError(message) {
            uploadError.textContent = message;
            uploadError.classList.remove('hidden');
        }

        function initializeQuiz() {
            uploadSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            currentQuestionIndex = 0;
            userAnswers = {};
            showingResults = false;
            displayQuestion();
        }

        function setMode(elimination) {
            isEliminationMode = elimination;
            eliminationModeBtn.classList.toggle('active', elimination);
            answerModeBtn.classList.toggle('active', !elimination);
            choices.forEach(choice => {
                choice.style.pointerEvents = 'auto';
            });
            if (elimination) {
                choices.forEach(choice => choice.classList.remove('selected'));
                submitBtn.classList.add('hidden');
                resetBtn.classList.add('hidden');
            }
        }

        function expandQuestion() {
            choicesContainer.style.display = 'block';
            showChoicesBtn.classList.add('hidden');
        }

        function displayQuestion() {
            const question = questions[currentQuestionIndex];
            questionCounter.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            stemText.textContent = question.stem;
            choices[0].querySelector('.choice-text').textContent = question.choices.A;
            choices[1].querySelector('.choice-text').textContent = question.choices.B;
            choices[2].querySelector('.choice-text').textContent = question.choices.C;
            choices[3].querySelector('.choice-text').textContent = question.choices.D;
            choicesContainer.style.display = 'none';
            showChoicesBtn.classList.remove('hidden');
            resetQuestionState(); 
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === questions.length - 1;
        }

        function resetQuestionState() {
            choices.forEach(choice => {
                choice.classList.remove('eliminated', 'selected', 'correct-answer', 'incorrect-selected');
                choice.style.pointerEvents = 'auto'; 
            });
            setMode(true);
            resultsInfo.classList.add('hidden');
            showingResults = false;
        }

        function handleChoiceClick(event) {
            if (event.target.classList.contains('rationale-btn') || showingResults) return;
            const clickedChoice = event.currentTarget;
            if (isEliminationMode) {
                clickedChoice.classList.toggle('eliminated');
                if (document.querySelectorAll('.choice:not(.eliminated)').length <= 1) setMode(false);
            } else {
                choices.forEach(choice => choice.classList.remove('selected'));
                clickedChoice.classList.add('selected');
                userAnswers[currentQuestionIndex] = clickedChoice.id.replace('choice', '');
                submitBtn.classList.remove('hidden');
                resetBtn.classList.remove('hidden');
            }
        }

        function submitAnswer() {
            if (!userAnswers[currentQuestionIndex]) return;
            const question = questions[currentQuestionIndex];
            const userAnswer = userAnswers[currentQuestionIndex];
            const isCorrect = userAnswer === question.correct;
            showingResults = true;
            choices.forEach((choice, index) => {
                const label = ['A', 'B', 'C', 'D'][index];
                choice.classList.remove('selected');
                if (label === question.correct) choice.classList.add('correct-answer');
                if (label === userAnswer && !isCorrect) choice.classList.add('incorrect-selected');
            });
            resultsInfo.innerHTML = `<div class="result-message">${isCorrect ? 'Correct!' : 'Incorrect.'} The answer is ${question.correct}.</div>`;
            if (question.topic || question.bloom) {
                resultsInfo.innerHTML += `<div class="meta-info">${question.topic || ''} | ${question.bloom || ''}</div>`;
            }
            resultsInfo.classList.remove('hidden');
            submitBtn.classList.add('hidden');
            resetBtn.classList.add('hidden');
        }

        function navigateQuestion(direction) {
            const newIndex = currentQuestionIndex + direction;
            if (newIndex >= 0 && newIndex < questions.length) {
                currentQuestionIndex = newIndex;
                displayQuestion();
            }
        }

        function handleRationaleClick(event) {
            event.stopPropagation();
            const choice = event.target.getAttribute('data-choice');
            const question = questions[currentQuestionIndex];
            rationaleTitle.textContent = `Rationale for Choice ${choice}`;
            rationaleText.textContent = question.rationales[choice];
            rationaleModal.style.display = 'flex';
            rationaleModal.classList.remove('hidden');
        }
        
        function hideRationaleModal() { rationaleModal.style.display = 'none'; }
        function handleRationaleModalOutsideClick(event) { if (event.target === rationaleModal) hideRationaleModal(); }
        function hideEmbedModal() { embedModal.style.display = 'none'; }
        function handleModalOutsideClick(event) { if (event.target === embedModal) hideEmbedModal(); }
    </script>
</body>
</html>
