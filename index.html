<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Choice Tutor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            background: #f8f9fa;
        }
        
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            text-align: center;
            color: white;
            margin: 0;
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        
        .upload-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border: 2px dashed #ddd;
            border-radius: 8px;
        }

        .upload-title {
            font-size: 1.3em;
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }

        .upload-subtitle {
            margin-top: 0;
            margin-bottom: 20px;
            color: #666;
            font-size: 0.95em;
        }
        
        .file-input {
            margin: 10px 0;
            padding: 8px;
        }

        /* Layout for the selection card */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .option-card {
            flex: 0 1 400px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 15px 20px;
            background: #fafafa;
            text-align: center;
        }

        .option-card h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 1.05em;
            color: #333;
        }

        .option-card p {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 0.95em;
            color: #555;
        }

        .bank-select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .mode-btn.active {
            background: #3498db;
            color: white;
        }
        
        .question-counter {
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            color: #666;
        }
        
        .question-container {
            min-height: 400px;
        }
        
        .question-stem {
            background: #e8f4f8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid transparent;
        }
        
        .show-choices-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        
        .show-choices-btn.hover {
            background: #2980b9;
        }
        
        .show-choices-btn.hidden {
            display: none;
        }
        
        .choices-container {
            display: none;
            margin-top: 20px;
        }
        
        .choice {
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .choice-content {
            flex: 1;
        }
        
        .choice:hover {
            border-color: #3498db;
            background: #f8f9fa;
        }
        
        .choice.eliminated {
            text-decoration: line-through;
            opacity: 0.5;
            background: #f8d7da;
            border-color: #dc3545;
        }
        
        .choice.selected {
            font-weight: bold;
            background: #d1ecf1;
            border-color: #3498db;
        }
        
        .choice.correct-answer {
            background: #d4edda;
            border-color: #28a745;
            font-weight: bold;
        }
        
        .choice.incorrect-selected {
            background: #f8d7da;
            border-color: #dc3545;
            font-weight: bold;
        }
        
        .choice-label {
            font-weight: bold;
            display: inline-block;
            width: 20px;
        }
        
        .rationale-btn {
            background: #5a6d8c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 20px;
            line-height: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            margin-left: 10px;
        }
        
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        
        .btn {
            padding: 12px 24px;
            margin: 0 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .results-info {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #e8f5e8;
            border-radius: 6px;
            color: #155724;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
        
        .hidden {
            display: none;
        }

        #rationaleModal, #embedModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
            display: none;
        }
        
        #rationaleModalContent, #modalContent {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        #closeRationaleBtn, #closeModalBtn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <h1>Multiple Choice Tutor</h1>
        </div>
        
        <div class="upload-section" id="uploadSection">
            <h2 class="upload-title">Get started with your quiz</h2>
            <p class="upload-subtitle">Choose one of the options below to load questions.</p>

            <div id="uploadError" class="error hidden"></div>

            <div class="options-grid">
                <div class="option-card">
                    <h3>3. Use a saved question bank</h3>
                    <p>Load a shared bank stored with this app.</p>
                    <select id="bankSelect" class="bank-select">
                        <option value="">Select a question bank...</option>
                        <option value="banks/Advanced Health Assessment - Review.csv">Advanced Health Assessment: Review</option>
                    </select>
                    <button class="btn btn-primary" id="loadBankBtn">Load Question Bank</button>
                </div>
            </div>

            <div style="display:none">
                <input type="file" id="csvFile">
                <button id="toggleTemplateInstructions"></button>
                <button id="downloadTemplateBtn"></button>
                <div id="templateInstructions"></div>
            </div>
        </div>
        
        <div id="quizSection" class="hidden">
            <div class="mode-selector">
                <button class="mode-btn active" id="eliminationMode">Elimination Mode</button>
                <button class="mode-btn" id="answerMode">Answer Mode</button>
            </div>
            
            <div class="question-counter" id="questionCounter"></div>
            
            <div class="question-container">
                <div class="question-stem" id="questionStem">
                    <div id="stemText"></div>
                </div>
                
                <button class="show-choices-btn" id="showChoicesBtn">Show Answer Choices</button>
                
                <div class="choices-container" id="choicesContainer">
                    <div class="choice" id="choiceA">
                        <div class="choice-content">
                            <span class="choice-label">A.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="A">?</button>
                    </div>
                    <div class="choice" id="choiceB">
                        <div class="choice-content">
                            <span class="choice-label">B.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="B">?</button>
                    </div>
                    <div class="choice" id="choiceC">
                        <div class="choice-content">
                            <span class="choice-label">C.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="C">?</button>
                    </div>
                    <div class="choice" id="choiceD">
                        <div class="choice-content">
                            <span class="choice-label">D.</span> <span class="choice-text"></span>
                        </div>
                        <button class="rationale-btn" data-choice="D">?</button>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-secondary" id="prevBtn">Previous</button>
                <button class="btn btn-secondary hidden" id="resetBtn">Reset</button>
                <button class="btn btn-success hidden" id="submitBtn">Submit Answer</button>
                <button class="btn btn-primary" id="nextBtn">Next</button>
            </div>
            
            <div class="results-info hidden" id="resultsInfo"></div>
        </div>
    </div>

    <div id="rationaleModal" class="hidden">
        <div id="rationaleModalContent">
            <button id="closeRationaleBtn">&times;</button>
            <h3 id="rationaleTitle">Rationale</h3>
            <div id="rationaleText"></div>
        </div>
    </div>

    <div id="embedModal" class="hidden">
        <div id="modalContent">
            <button id="closeModalBtn">&times;</button>
            <div id="embedTarget"></div>
        </div>
    </div>

    <script>
        // ORIGINAL SCRIPT - UNTOUCHED
        let questions = [];
        let currentQuestionIndex = 0;
        let isEliminationMode = true;
        let userAnswers = {};
        let showingResults = false;

        const uploadSection = document.getElementById('uploadSection');
        const quizSection = document.getElementById('quizSection');
        const csvFileInput = document.getElementById('csvFile');
        const uploadError = document.getElementById('uploadError');
        const eliminationModeBtn = document.getElementById('eliminationMode');
        const answerModeBtn = document.getElementById('answerMode');
        const questionCounter = document.getElementById('questionCounter');
        const questionStem = document.getElementById('questionStem');
        const stemText = document.getElementById('stemText');
        const showChoicesBtn = document.getElementById('showChoicesBtn');
        const choicesContainer = document.getElementById('choicesContainer');
        const choices = document.querySelectorAll('.choice');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetBtn = document.getElementById('resetBtn'); 
        const submitBtn = document.getElementById('submitBtn');
        const resultsInfo = document.getElementById('resultsInfo');

        const toggleTemplateInstructionsBtn = document.getElementById('toggleTemplateInstructions');
        const templateInstructions = document.getElementById('templateInstructions');
        const downloadTemplateBtn = document.getElementById('downloadTemplateBtn');

        const bankSelect = document.getElementById('bankSelect');
        const loadBankBtn = document.getElementById('loadBankBtn');
        
        const embedModal = document.getElementById('embedModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const embedTarget = document.getElementById('embedTarget');
        
        const rationaleModal = document.getElementById('rationaleModal');
        const closeRationaleBtn = document.getElementById('closeRationaleBtn');
        const rationaleTitle = document.getElementById('rationaleTitle');
        const rationaleText = document.getElementById('rationaleText');
        const rationaleBtns = document.querySelectorAll('.rationale-btn');

        if (csvFileInput) {
            csvFileInput.addEventListener('change', handleFileUpload);
        }
        eliminationModeBtn.addEventListener('click', () => setMode(true));
        answerModeBtn.addEventListener('click', () => setMode(false));
        showChoicesBtn.addEventListener('click', expandQuestion);
        choices.forEach(choice => choice.addEventListener('click', handleChoiceClick));
        prevBtn.addEventListener('click', () => navigateQuestion(-1));
        nextBtn.addEventListener('click', () => navigateQuestion(1));
        resetBtn.addEventListener('click', resetQuestionState); 
        submitBtn.addEventListener('click', submitAnswer);
        
        closeModalBtn.addEventListener('click', hideEmbedModal);
        embedModal.addEventListener('click', handleModalOutsideClick);
        
        closeRationaleBtn.addEventListener('click', hideRationaleModal);
        rationaleModal.addEventListener('click', handleRationaleModalOutsideClick);
        rationaleBtns.forEach(btn => btn.addEventListener('click', handleRationaleClick));

        if (toggleTemplateInstructionsBtn) {
            toggleTemplateInstructionsBtn.addEventListener('click', () => templateInstructions.classList.toggle('hidden'));
        }
        if (downloadTemplateBtn) {
            downloadTemplateBtn.addEventListener('click', downloadCsvTemplate);
        }

        if (loadBankBtn) {
            loadBankBtn.addEventListener('click', loadSelectedBank);
        }

        function downloadCsvTemplate() {
            const csvData = ["id", "topic", "bloom", "stem", "choice_a", "choice_b", "choice_c", "choice_d", "correct", "choice_a_rationale", "choice_b_rationale", "choice_c_rationale", "choice_d_rationale", "embed_code"].join(',');
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', 'MultipleChoiceTemplate.csv');
            link.click();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                transformHeader: header => header.toLowerCase().trim(),
                complete: function(results) {
                    questions = processQuestions(results.data);
                    initializeQuiz();
                }
            });
        }

        function loadSelectedBank() {
            const path = bankSelect.value;
            if (!path) return;
            fetch(path)
                .then(response => response.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        transformHeader: header => header.toLowerCase().trim(),
                        complete: function(results) {
                            questions = processQuestions(results.data);
                            initializeQuiz();
                        }
                    });
                });
        }

        function processQuestions(data) {
            return data.map(row => ({
                id: row.id || '',
                topic: row.topic || '',
                bloom: row.bloom || '',
                stem: row.stem,
                choices: { A: row.choice_a, B: row.choice_b, C: row.choice_c, D: row.choice_d },
                rationales: { A: row.choice_a_rationale, B: row.choice_b_rationale, C: row.choice_c_rationale, D: row.choice_d_rationale },
                correct: row.correct.toString().toUpperCase().trim(),
                embed_code: row.embed_code || ''
            }));
        }

        function initializeQuiz() {
            uploadSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            currentQuestionIndex = 0;
            displayQuestion();
        }

        function setMode(elimination) {
            isEliminationMode = elimination;
            eliminationModeBtn.classList.toggle('active', elimination);
            answerModeBtn.classList.toggle('active', !elimination);
        }

        function expandQuestion() {
            choicesContainer.style.display = 'block';
            showChoicesBtn.classList.add('hidden');
        }

        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            questionCounter.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            stemText.textContent = q.stem;
            choices[0].querySelector('.choice-text').textContent = q.choices.A;
            choices[1].querySelector('.choice-text').textContent = q.choices.B;
            choices[2].querySelector('.choice-text').textContent = q.choices.C;
            choices[3].querySelector('.choice-text').textContent = q.choices.D;
            choicesContainer.style.display = 'none';
            showChoicesBtn.classList.remove('hidden');
            resetQuestionState();
        }

        function resetQuestionState() {
            choices.forEach(c => c.classList.remove('eliminated', 'selected', 'correct-answer', 'incorrect-selected'));
            resultsInfo.classList.add('hidden');
            showingResults = false;
        }

        function handleChoiceClick(e) {
            if (showingResults) return;
            const clicked = e.currentTarget;
            if (isEliminationMode) {
                clicked.classList.toggle('eliminated');
            } else {
                choices.forEach(c => c.classList.remove('selected'));
                clicked.classList.add('selected');
                userAnswers[currentQuestionIndex] = clicked.id.replace('choice', '');
                submitBtn.classList.remove('hidden');
            }
        }

        function submitAnswer() {
            const q = questions[currentQuestionIndex];
            const ans = userAnswers[currentQuestionIndex];
            showingResults = true;
            choices.forEach((c, i) => {
                const label = ['A', 'B', 'C', 'D'][i];
                if (label === q.correct) c.classList.add('correct-answer');
                if (label === ans && ans !== q.correct) c.classList.add('incorrect-selected');
            });
            resultsInfo.classList.remove('hidden');
            submitBtn.classList.add('hidden');
        }

        function navigateQuestion(dir) {
            currentQuestionIndex += dir;
            displayQuestion();
        }

        function handleRationaleClick(e) {
            const choice = e.target.getAttribute('data-choice');
            const q = questions[currentQuestionIndex];
            rationaleText.textContent = q.rationales[choice];
            rationaleModal.style.display = 'flex';
        }

        function hideRationaleModal() { rationaleModal.style.display = 'none'; }
        function handleRationaleModalOutsideClick(e) { if (e.target === rationaleModal) hideRationaleModal(); }
        function hideEmbedModal() { embedModal.style.display = 'none'; }
        function handleModalOutsideClick(e) { if (e.target === embedModal) hideEmbedModal(); }
    </script>
</body>
</html>
